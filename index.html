<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼 변속 엔진 시뮬레이터</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        .cluster {
            background: radial-gradient(circle, #222 0%, #000 100%);
            padding: 50px;
            border-radius: 50%;
            border: 8px solid #333;
            text-align: center;
            width: 350px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.1);
        }

        #rpm-needle {
            position: absolute;
            width: 2px;
            height: 140px;
            background: red;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transition: transform 0.05s linear;
        }

        #rpm-num { font-size: 5rem; font-weight: 900; color: #fff; margin: 0; }
        #gear-num { font-size: 3rem; color: #ff4500; font-weight: bold; }
        
        .redline { color: #ff0000 !important; animation: shake 0.1s infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        .pedals { display: flex; gap: 40px; margin-top: 50px; }
        .pedal {
            width: 70px; height: 160px;
            background: #222; border: 2px solid #444;
            border-radius: 5px; display: flex;
            align-items: center; justify-content: center;
            font-weight: bold; color: #666;
        }
        .active { background: #444; transform: translateY(10px) rotateX(20deg); color: #fff; }

        .guide { margin-top: 30px; color: #444; text-align: center; line-height: 1.6; }
        b { color: #888; }
    </style>
</head>
<body>

    <div class="cluster">
        <div id="gear-num">1</div>
        <div id="rpm-num">800</div>
        <div style="color: #444; letter-spacing: 5px;">RPM x 1000</div>
    </div>

    <div class="pedals">
        <div id="clutch-pedal" class="pedal">CLUTCH</div>
        <div id="gas-pedal" class="pedal" style="height: 190px;">GAS</div>
    </div>

    <div class="guide">
        <b>[Space]</b> 풀악셀 / <b>[W]</b> 기어 업 / <b>[S]</b> 기어 다운<br>
        실제 차처럼 변속 시 RPM이 툭 떨어지는 맛을 살림
    </div>

    <script>
        let audioCtx, mainOsc, gainNode, filter;
        let rpm = 800;
        let gear = 1;
        let isGas = false;
        let isShifting = false;

        const gearConfigs = {
            1: { ratio: 0.04, max: 6000, drop: 0.5 },
            2: { ratio: 0.025, max: 7000, drop: 0.6 },
            3: { ratio: 0.018, max: 8000, drop: 0.7 },
            4: { ratio: 0.012, max: 8500, drop: 0.8 },
            5: { ratio: 0.008, max: 9000, drop: 0.85 }
        };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 800;

            mainOsc = audioCtx.createOscillator();
            mainOsc.type = 'sawtooth';

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;

            mainOsc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            mainOsc.start();
        }

        function shiftGear(dir) {
            if (isShifting) return;
            const next = gear + dir;
            if (next >= 1 && next <= 5) {
                isShifting = true;
                document.getElementById('clutch-pedal').classList.add('active');
                
                // 변속 시 사운드 일시 차단 및 RPM 보정
                const oldGear = gear;
                gear = next;
                
                setTimeout(() => {
                    if (dir > 0) rpm = rpm * (gearConfigs[oldGear].drop); // 변속 충격/하강
                    document.getElementById('gear-num').innerText = gear;
                    document.getElementById('clutch-pedal').classList.remove('active');
                    isShifting = false;
                }, 150); // 0.15초 변속 딜레이
            }
        }

        function engineLoop() {
            const config = gearConfigs[gear];

            if (isShifting) {
                // 변속 중엔 RPM이 관성으로 아주 살짝 떨어짐
                rpm -= 50;
            } else if (isGas) {
                // 가속: 현재 RPM이 높을수록 가속력이 줄어드는 물리 적용
                let acceleration = (config.max - rpm) * config.ratio;
                rpm += acceleration;
                
                // 레드존 진입 시 퓨얼컷(부들부들) 효과
                if (rpm >= config.max - 100) {
                    rpm -= 200; 
                }
            } else {
                // 엔진 브레이크 & 아이들링
                rpm -= (rpm - 800) * 0.03 + 5;
            }

            if (rpm < 800) rpm = 800;

            // UI 업데이트
            const rpmText = document.getElementById('rpm-num');
            rpmText.innerText = Math.floor(rpm);
            if (rpm > 7000) rpmText.classList.add('redline');
            else rpmText.classList.remove('redline');

            // 소리 업데이트
            if (audioCtx) {
                const now = audioCtx.currentTime;
                // 변속 중엔 볼륨 확 줄임
                const targetGain = isShifting ? 0.02 : (0.1 + (rpm / 20000));
                gainNode.gain.setTargetAtTime(targetGain, now, 0.03);

                // RPM에 따른 주파수 및 필터 개방
                mainOsc.frequency.setTargetAtTime(25 + (rpm / 55), now, 0.05);
                filter.frequency.setTargetAtTime(500 + (rpm / 5), now, 0.05);
            }

            requestAnimationFrame(engineLoop);
        }

        // 입력 처리
        const pressGas = (e) => {
            if (e.repeat) return;
            initAudio();
            isGas = true;
            document.getElementById('gas-pedal').classList.add('active');
        };
        const releaseGas = () => {
            isGas = false;
            document.getElementById('gas-pedal').classList.remove('active');
        };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') pressGas(e);
            if (e.key.toLowerCase() === 'w') shiftGear(1);
            if (e.key.toLowerCase() === 's') shiftGear(-1);
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') releaseGas();
        });

        engineLoop();
    </script>
</body>
</html>
