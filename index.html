<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8단 리얼 변속 시뮬레이터</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            user-select: none;
        }

        .cluster {
            text-align: center;
            border: 10px solid #222;
            padding: 60px;
            border-radius: 40px;
            background: #000;
            box-shadow: inset 0 0 50px #111, 0 20px 50px rgba(0,0,0,0.8);
        }

        #gear-num { font-size: 5rem; color: #ff0000; line-height: 1; }
        #rpm-num { font-size: 6rem; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .unit { color: #444; font-size: 1.2rem; letter-spacing: 3px; }

        .pedals { display: flex; gap: 30px; margin-top: 40px; }
        .pedal {
            width: 80px; height: 180px;
            background: #1a1a1a; border: 3px solid #333;
            border-radius: 10px; display: flex;
            align-items: center; justify-content: center;
            color: #444; font-size: 0.8rem;
        }
        .active { background: #333; color: #fff; border-color: #555; transform: translateY(10px); }

        .guide { margin-top: 40px; color: #555; text-align: center; font-size: 0.9rem; font-family: sans-serif; }
        .redline { color: #ff4d4d !important; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>

    <div class="cluster">
        <div id="gear-num">1</div>
        <div id="rpm-num">800</div>
        <div class="unit">RPM / GEAR 8-SPEED</div>
    </div>

    <div class="pedals">
        <div id="clutch" class="pedal">CLUTCH</div>
        <div id="gas" class="pedal" style="height: 210px;">GAS</div>
    </div>

    <div class="guide">
        <b>[Space]</b> 가속 / <b>[W]</b> 업쉬프트 / <b>[S]</b> 다운쉬프트<br>
        다운쉬프트 시 자동으로 RPM이 보정(Rev-matching)됩니다.
    </div>

    <script>
        let audioCtx, mainOsc, subOsc, gainNode, filter;
        let rpm = 800;
        let gear = 1;
        let isGas = false;
        let isShifting = false;

        // 8단 기어비 및 설정 (숫자가 낮을수록 고단 부하)
        const gearConfigs = {
            1: { ratio: 0.05, max: 7000, nextRpm: 0.6 },
            2: { ratio: 0.035, max: 7200, nextRpm: 0.65 },
            3: { ratio: 0.025, max: 7500, nextRpm: 0.7 },
            4: { ratio: 0.018, max: 7800, nextRpm: 0.75 },
            5: { ratio: 0.014, max: 8000, nextRpm: 0.8 },
            6: { ratio: 0.011, max: 8200, nextRpm: 0.82 },
            7: { ratio: 0.009, max: 8400, nextRpm: 0.85 },
            8: { ratio: 0.007, max: 8500, nextRpm: 0.9 }
        };

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";

            mainOsc = audioCtx.createOscillator();
            mainOsc.type = 'sawtooth';

            subOsc = audioCtx.createOscillator();
            subOsc.type = 'square'; // 엔진의 묵직한 질감

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0;

            mainOsc.connect(filter);
            subOsc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            mainOsc.start();
            subOsc.start();
        }

        function changeGear(dir) {
            if (isShifting) return;
            const next = gear + dir;
            if (next >= 1 && next <= 8) {
                isShifting = true;
                const now = audioCtx.currentTime;
                document.getElementById('clutch').classList.add('active');

                // 소리 연결을 위한 부드러운 페이드 아웃
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

                setTimeout(() => {
                    if (dir > 0) {
                        // 업쉬프트: RPM 하강
                        rpm = rpm * gearConfigs[gear].nextRpm;
                    } else {
                        // 다운쉬프트: RPM 보정 (Rev-match)
                        rpm = rpm / gearConfigs[next].nextRpm;
                        if (rpm > gearConfigs[next].max) rpm = gearConfigs[next].max - 200;
                    }

                    gear = next;
                    document.getElementById('gear-num').innerText = gear;
                    document.getElementById('clutch').classList.remove('active');
                    
                    // 소리 다시 페이드 인
                    gainNode.gain.exponentialRampToValueAtTime(0.1 + (rpm / 20000), audioCtx.currentTime + 0.1);
                    isShifting = false;
                }, 120); 
            }
        }

        function engineLoop() {
            const config = gearConfigs[gear];

            if (isShifting) {
                rpm -= 30; // 변속 중 미세 하강
            } else if (isGas) {
                rpm += (config.max - rpm) * config.ratio;
                // 퓨얼컷 (레드존 떨림)
                if (rpm >= config.max - 50) rpm -= 150;
            } else {
                rpm -= (rpm - 800) * 0.04 + 10;
            }

            if (rpm < 800) rpm = 800;

            // UI
            const rpmText = document.getElementById('rpm-num');
            rpmText.innerText = Math.floor(rpm);
            if (rpm > config.max - 1000) rpmText.classList.add('redline');
            else rpmText.classList.remove('redline');

            // Sound
            if (audioCtx && !isShifting) {
                const now = audioCtx.currentTime;
                const baseFreq = 20 + (rpm / 50);
                mainOsc.frequency.setTargetAtTime(baseFreq, now, 0.05);
                subOsc.frequency.setTargetAtTime(baseFreq * 0.5, now, 0.05);
                
                gainNode.gain.setTargetAtTime(0.1 + (rpm / 18000), now, 0.05);
                filter.frequency.setTargetAtTime(400 + (rpm / 4), now, 0.05);
            }

            requestAnimationFrame(engineLoop);
        }

        const startGas = (e) => { if (e.repeat) return; initAudio(); isGas = true; document.getElementById('gas').classList.add('active'); };
        const stopGas = () => { isGas = false; document.getElementById('gas').classList.remove('active'); };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') startGas(e);
            if (e.key.toLowerCase() === 'w') changeGear(1);
            if (e.key.toLowerCase() === 's') changeGear(-1);
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'Space') stopGas(); });

        engineLoop();
    </script>
</body>
</html>
