<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기어 쉬프트 엔진 시뮬레이터</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        .dashboard {
            text-align: center;
            padding: 30px;
            border: 4px solid #444;
            border-radius: 20px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        #rpm-display {
            font-size: 5rem;
            color: #00ff00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        #gear-display {
            font-size: 3rem;
            color: #fff;
            margin: 10px 0;
        }

        .redline { color: #ff0000 !important; text-shadow: 0 0 15px #ff0000 !important; }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            align-items: flex-end;
        }

        .pedal {
            width: 80px;
            height: 150px;
            background: #333;
            border: 2px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
        }

        #gas:active { transform: rotateX(25deg); background: #555; }
        
        .gear-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            background: #222;
            color: white;
            border: 1px solid #444;
            cursor: pointer;
        }

        button:hover { background: #444; }

        .info { margin-top: 20px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div id="gear-display">GEAR: 1</div>
        <div id="rpm-display">800</div>
        <div style="font-size: 1rem; color: #666;">RPM</div>
    </div>

    <div class="controls">
        <div class="gear-buttons">
            <button onclick="changeGear(1)">Shift Up (W)</button>
            <button onclick="changeGear(-1)">Shift Down (S)</button>
        </div>
        <div id="gas" class="pedal" style="height: 180px;">GAS</div>
    </div>

    <div class="info">
        GAS: 스페이스바 / Shift Up: W / Shift Down: S<br>
        (RPM이 너무 높으면 소리가 찢어질 수 있음)
    </div>

    <script>
        let audioCtx, mainOsc, subOsc, gainNode;
        let rpm = 800;
        let gear = 1;
        let isAccelerating = false;
        const maxRpm = 8500;
        const idleRpm = 800;

        // 기어비 설정 (1단이 제일 가속이 빠름)
        const gearRatios = [0, 0.12, 0.08, 0.06, 0.04, 0.03]; 

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            mainOsc = audioCtx.createOscillator();
            mainOsc.type = 'sawtooth';
            
            subOsc = audioCtx.createOscillator();
            subOsc.type = 'square'; // 좀 더 거친 엔진 느낌

            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.1;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200;

            mainOsc.connect(filter);
            subOsc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            mainOsc.start();
            subOsc.start();
        }

        function changeGear(val) {
            let nextGear = gear + val;
            if (nextGear >= 1 && nextGear <= 5) {
                gear = nextGear;
                document.getElementById('gear-display').innerText = `GEAR: ${gear}`;
                // 변속 시 RPM 살짝 튀는 효과 (리얼리티)
                rpm -= 1500;
                if (rpm < idleRpm) rpm = idleRpm;
            }
        }

        function update() {
            if (isAccelerating) {
                // 기어비에 따른 가속 속도 차이
                rpm += (maxRpm - rpm) * gearRatios[gear];
            } else {
                rpm += (idleRpm - rpm) * 0.05;
            }

            // RPM 화면 표시 및 레드존 연출
            const display = document.getElementById('rpm-display');
            display.innerText = Math.floor(rpm);
            if (rpm > 7500) {
                display.classList.add('redline');
            } else {
                display.classList.remove('redline');
            }

            // 사운드 업데이트
            if (mainOsc && audioCtx) {
                const now = audioCtx.currentTime;
                const freq = 20 + (rpm / 45);
                mainOsc.frequency.setTargetAtTime(freq, now, 0.05);
                subOsc.frequency.setTargetAtTime(freq * 0.5, now, 0.05);
                
                // RPM 높을수록 소리 약간 더 커짐
                gainNode.gain.setTargetAtTime(0.08 + (rpm / 30000), now, 0.05);
            }

            requestAnimationFrame(update);
        }

        // 입력 제어
        const startAccel = (e) => {
            if (e.repeat) return;
            initAudio();
            isAccelerating = true;
        };
        const stopAccel = () => isAccelerating = false;

        document.getElementById('gas').addEventListener('mousedown', startAccel);
        window.addEventListener('mouseup', stopAccel);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') startAccel(e);
            if (e.key.toLowerCase() === 'w') changeGear(1);
            if (e.key.toLowerCase() === 's') changeGear(-1);
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') stopAccel();
        });

        update();
    </script>
</body>
</html>
